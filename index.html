<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Host</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f6f9;
      color: #24292e;
      padding: 2rem;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    .subtitle { color: #586069; margin-bottom: 2rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); border-color: #0366d6; }
    .card .env {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      width: fit-content;
    }
    .env.staging { background: #fff3cd; color: #856404; }
    .env.prod    { background: #d4edda; color: #155724; }
    .card h2 { font-size: 1.1rem; }
    .card p  { font-size: 0.875rem; color: #586069; }
    section { margin-bottom: 2.5rem; }
    section > h2 { font-size: 1.25rem; margin-bottom: 1rem; color: #24292e; border-bottom: 2px solid #e1e4e8; padding-bottom: 0.4rem; }
    #error { color: #cb2431; margin-top: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>🌐 Page Host</h1>
  <p class="subtitle">Multi-environment, multi-product static page hosting</p>
  <div id="content"></div>
  <p id="error" hidden></p>

  <script>
    const ENV_META = {
      staging: { icon: '🟡', label: 'Staging' },
      prod:    { icon: '🟢', label: 'Production' },
    };

    function envMeta(env) {
      return ENV_META[env] || { icon: '🔵', label: env };
    }

    function buildSection(env, products) {
      const { icon, label } = envMeta(env);
      const cards = products.map(product => `
        <a class="card" href="${env}/${product}/">
          <span class="env ${env}">${label}</span>
          <h2>${product}</h2>
          <p>${label} build of ${product}</p>
        </a>`).join('');
      return `
        <section>
          <h2>${icon} ${label}</h2>
          <div class="grid">${cards}</div>
        </section>`;
    }

    function parseProducts(text) {
      // Group by environment, preserving order of first appearance
      const groups = new Map();
      text.split('\n').forEach(raw => {
        const line = raw.trim();
        if (!line || line.startsWith('#')) return;
        const slash = line.indexOf('/');
        if (slash === -1) return;
        const env = line.slice(0, slash).trim();
        const product = line.slice(slash + 1).trim();
        if (!env || !product) return;
        if (!groups.has(env)) groups.set(env, []);
        groups.get(env).push(product);
      });
      return groups;
    }

    fetch('products.txt')
      .then(res => {
        if (!res.ok) throw new Error(`Could not load products.txt (HTTP ${res.status})`);
        return res.text();
      })
      .then(text => {
        const groups = parseProducts(text);
        const html = Array.from(groups.entries())
          .map(([env, products]) => buildSection(env, products))
          .join('');
        document.getElementById('content').innerHTML = html || '<p>No products found in products.txt.</p>';
      })
      .catch(err => {
        const el = document.getElementById('error');
        el.textContent = `Error: ${err.message}`;
        el.hidden = false;
      });
  </script>
</body>
</html>
