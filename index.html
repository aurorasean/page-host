<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Host</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f6f9;
      color: #24292e;
      padding: 2rem;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    .subtitle { color: #586069; margin-bottom: 2rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); border-color: #0366d6; }
    .card .env {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      width: fit-content;
    }
    .env.staging { background: #fff3cd; color: #856404; }
    .env.prod    { background: #d4edda; color: #155724; }
    .card h2 { font-size: 1.1rem; }
    .card p  { font-size: 0.875rem; color: #586069; }
    section { margin-bottom: 2.5rem; }
    section > h2 { font-size: 1.25rem; margin-bottom: 1rem; color: #24292e; border-bottom: 2px solid #e1e4e8; padding-bottom: 0.4rem; }
  </style>
</head>
<body>
  <h1>🌐 Page Host</h1>
  <p class="subtitle">Multi-environment, multi-product static page hosting</p>

  <section>
    <h2>🟡 Staging</h2>
    <div class="grid">
      <a class="card" href="staging/product1/">
        <span class="env staging">Staging</span>
        <h2>Product 1</h2>
        <p>Staging build of Product 1</p>
      </a>
      <a class="card" href="staging/product2/">
        <span class="env staging">Staging</span>
        <h2>Product 2</h2>
        <p>Staging build of Product 2</p>
      </a>
    </div>
  </section>

  <section>
    <h2>🟢 Production</h2>
    <div class="grid">
      <a class="card" href="prod/product1/">
        <span class="env prod">Prod</span>
        <h2>Product 1</h2>
        <p>Production build of Product 1</p>
      </a>
      <a class="card" href="prod/product2/">
        <span class="env prod">Prod</span>
        <h2>Product 2</h2>
        <p>Production build of Product 2</p>
      </a>
    </div>
  </section>
</body>
</html>
